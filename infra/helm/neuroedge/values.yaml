# NeuroEdge v2 — Helm Values
# Override these for different environments (dev / staging / prod)

replicaCount: 2

image:
  repository: ghcr.io/harigd77/neuroedge
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

probes:
  liveness:
    path: /healthz
    port: 8000
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    path: /readyz
    port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 8
  prometheusMetric: neuroedge_anomaly_score
  threshold: "1.5"

rbac:
  create: true

networkPolicy:
  enabled: true

namespace: neuroedge

config:
  APP_ENV: production
  IOT_NODE_COUNT: "8"
  ANOMALY_THRESHOLD: "2.5"
  RELIABILITY_TARGET: "0.9995"
  ANOMALY_ALGO: "CUSUM+EWMA+Zscore"

simulator:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
